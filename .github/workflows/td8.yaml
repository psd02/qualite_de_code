name: liste des trucs

on: [push]

jobs:
  liste-fichiers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: faire un ls (nan jure)
        run: ls td8 --all

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install -g testcafe

      - name: Start PHP server
        run: php -S localhost:8000 -t td8 &

      - name: Wait for server
        run: sleep 3

      - name: Run TestCafe tests
        run: npx testcafe chrome:headless .